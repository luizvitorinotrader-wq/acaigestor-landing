<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fale no WhatsApp | VendaFlow</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 24px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .badge {
      display: inline-block;
      background: #e8fff0;
      color: #128c4a;
      padding: 8px 14px;
      border-radius: 999px;
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 18px;
    }

    h1 {
      font-size: 26px;
      line-height: 1.2;
      margin: 0 0 12px;
    }

    p {
      font-size: 16px;
      line-height: 1.5;
      color: #555;
      margin-bottom: 28px;
    }

    .button {
      display: block;
      width: 100%;
      background: #25d366;
      color: #111;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      padding: 18px 20px;
      border-radius: 999px;
      box-sizing: border-box;
    }

    .small {
      font-size: 13px;
      color: #777;
      margin-top: 18px;
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="badge">VendaFlow</div>

    <h1>Quer vender mais pelo WhatsApp?</h1>

    <p>
      Fale comigo agora e veja como o VendaFlow funciona na prática
      para pequenos negócios que querem receber mais pedidos.
    </p>

    <a
      class="button"
      href="https://wa.me/5573981612637?text=Quero%20ver%20como%20funciona%20na%20pr%C3%A1tica%20e%20quanto%20custa."
    >
      Abrir conversa no WhatsApp
    </a>

    <div class="small">
      Toque no botão acima para iniciar a conversa.
    </div>
  </main>
</body>
</html>
